# ============================================================================
# nginx.conf — Configuration Nginx pour le frontend SPA React Météo IA France
# ============================================================================
# Ce fichier remplace le default.conf de l'image nginx:alpine.
# Il configure Nginx pour servir une SPA (Single Page Application) React/Vite.
#
# Fonctionnalités :
#   1. SPA fallback : toute route inconnue → /index.html (pour React Router)
#   2. Compression gzip : réduit le poids des assets de ~70%
#   3. Cache headers : long cache pour assets hashés, no-cache pour index.html
#   4. Sécurité : headers HTTP de base (XSS, clickjacking, MIME sniffing)
# ============================================================================

server {
    # Port d'écoute interne au container (mappé en externe par docker-compose)
    listen       80;
    listen       [::]:80;
    server_name  _;

    # Dossier racine où Nginx cherche les fichiers à servir
    root   /usr/share/nginx/html;
    index  index.html;

    # ─── Sécurité : headers HTTP de base ────────────────────────────────────
    # X-Content-Type-Options : empêche le MIME-type sniffing (sécurité)
    add_header X-Content-Type-Options "nosniff" always;
    # X-Frame-Options : empêche d'embarquer le site dans un <iframe>
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Referrer-Policy : ne fuite pas trop d'info dans les en-têtes Referer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Compression gzip ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ─── Cache headers : assets hashés (.js, .css, images) ──────────────────
    # Vite ajoute un hash dans les noms de fichiers (ex: main.a3f9b2.js)
    # → on peut les mettre en cache TRÈS longtemps (1 an) sans risque
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Cache headers : index.html (toujours frais) ────────────────────────
    # On NE met PAS en cache index.html : il référence les fichiers hashés,
    # donc il doit être re-téléchargé à chaque visite pour avoir les bons hash.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ─── Reverse proxy /api/* → backend container ──────────────────────────
    # Quand le frontend appelle /api/forecast (URL relative), Nginx du container
    # transmet la requête au container "backend" sur son port 3001.
    # IMPORTANT : "backend" est le NOM DU SERVICE dans docker-compose.yml,
    #             résolu via le DNS interne du réseau Docker.
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts : laisser le backend traiter les grosses requêtes (heatmap)
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ─── SPA fallback : toute route → /index.html ───────────────────────────
    # CRITIQUE pour React Router : si l'utilisateur recharge une page comme
    # /dashboard ou /paris, le navigateur demande ce fichier à Nginx.
    # Sans ce fallback, Nginx renverrait 404. Avec ce fallback, il sert
    # index.html qui charge React, qui regarde l'URL et affiche la bonne page.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Healthcheck Nginx (utilisé par Docker HEALTHCHECK) ─────────────────
    # Endpoint léger qui répond toujours 200 OK : sert à vérifier que
    # Nginx tourne bien sans avoir à servir tout index.html.
    location = /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ─── Erreurs custom (optionnel : on garde celles par défaut de Nginx) ──
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
